name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build the frontend once and share it across all platform builds.
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            apt_packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - os: macos-13        # Intel x86_64
            goos: darwin
            goarch: amd64
          - os: macos-latest    # Apple Silicon arm64
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler (Linux arm64 only)
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          go build -tags release -o symbiont ./cmd/symbiont

      - name: Package
        run: |
          mkdir release
          cp symbiont release/
          cp .env.example release/
          tar -czf symbiont-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: symbiont-${{ matrix.goos }}-${{ matrix.goarch }}
          path: symbiont-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: symbiont-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: symbiont-*.tar.gz
          generate_release_notes: true
